name: CI deploy backend to GHCR

# Controls when the workflow will run
on:
  # Triggers the workflow on push events but only for tags
  push:
    branches: [ main ]
    paths:
      - backend/**
    tags:
      - "v*"
      - "beta-v*"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: decide docker tags
        id: dockertag
        run: |
          if [[ $REF == "refs/tags/v"* ]]
          then
            echo "tags=$BASE_TAG:latest, $BASE_TAG:beta, $BASE_TAG:${REF#refs/tags/}" >> $GITHUB_ENV
          elif [[ $REF == "refs/tags/beta-v"* ]]
          then
            echo "tags=$BASE_TAG:beta, $BASE_TAG:${REF#refs/tags/}" >> $GITHUB_ENV
          elif [[ $REF == "refs/heads/main" ]]
          then
            echo "tags=$BASE_TAG:latest, $BASE_TAG:dev" >> $GITHUB_ENV
          else
            echo "tags=$BASE_TAG:dev" >> $GITHUB_ENV
          fi
        env:
          REF: ${{ github.ref }}
          BASE_TAG: ghcr.io/thesadlig/kitchenowl-backend

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.tags }}
          cache-from: type=registry,ref=ghcr.io/thesadlig/kitchenowl-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/thesadlig/kitchenowl-backend:buildcache,mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
